<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출판학교 준비 계획표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f5f3ef; --surface: #ffffff; --surface2: #f0ede8; --border: #e2ddd6; --text: #2a2724; --text-muted: #7a7570; --text-dim: #b0aba4; --accent: #a07840; --accent2: #4a8c62; --accent3: #8c4f65; --accent4: #4a7a9c; --red: #a04840; --today: #a0784015; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; min-height: 100vh; padding: 40px 24px 80px; }
  header { max-width: 900px; margin: 0 auto 48px; border-bottom: 1px solid var(--border); padding-bottom: 28px; }
  h1 { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.3; text-align:center; }
  .subtitle { margin-top: 8px; font-size: 13px; color: var(--text-muted); text-align:center; }
  .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; justify-content:center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .week-section { max-width: 900px; margin: 0 auto 32px; }
  .week-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; padding-left: 2px; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; min-height: 160px; position: relative; transition: border-color 0.2s; cursor: pointer; }
  .day-card.today { border: 3px solid #7a9ab5 !important; background: #f0f7ff; }
  .day-date { font-size: 18px; font-family: 'Noto Serif KR', serif; font-weight: 600; }
  .day-of-week { font-size: 9px; color: var(--text-muted); }
  .tasks { display: flex; flex-direction: column; gap: 4px; margin-top:8px; }
  .task { font-size: 10px; padding: 4px 7px; border-radius: 4px; line-height: 1.4; display: flex; gap: 5px; cursor: pointer; user-select: none; }
  .task.done { opacity: 0.3; text-decoration: line-through; }
  .task.reading { background: #a0784012; border-left: 2px solid var(--accent); color: #7a5c2e; }
  .task.korean { background: #4a8c6212; border-left: 2px solid var(--accent2); color: #366a4a; }
  .task.study { background: #4a7a9c12; border-left: 2px solid var(--accent4); color: #365e78; }
  .task.milestone { background: #a0484012; border-left: 2px solid var(--red); color: var(--red); font-weight: 600; }
  .progress-section { max-width: 900px; margin: 32px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
  .progress-bar-wrap { background: var(--border); border-radius: 3px; height: 8px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { height: 100%; transition: width 0.5s ease; }
  .booklist-section { max-width: 900px; margin: 32px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px 28px; overflow-x: auto; }
  .book-item { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
  .book-item.all-done { background: #f9f9f9; opacity: 0.6; }
  @media (max-width: 600px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div style="max-width:900px; margin:40px auto; text-align:center;">
  <h1 style="font-size:36px; font-weight:600; font-family:'Noto Serif KR';">출판학교 준비</h1>
</div>

<!-- 포모도로 타이머 -->
<div id="pomo-section" style="max-width:900px; margin:0 auto 32px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px 28px;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
    <h2 style="font-family:'Noto Serif KR'; font-size:20px;">🍅 포모도로 타이머</h2>
    <div id="pomo-clock" style="font-size:14px; color:var(--text-muted);">00:00</div>
  </div>
  <div style="text-align:center;">
    <div id="pomo-display" style="font-size:54px; font-weight:300; margin-bottom:15px; font-variant-numeric: tabular-nums;">50:00</div>
    <div style="display:flex; justify-content:center; gap:10px;">
      <button id="pomo-start" style="padding:10px 30px; background:#5a4a3a; color:white; border:none; border-radius:8px; cursor:pointer;">시작</button>
      <button id="pomo-reset" style="padding:10px 20px; background:none; border:1px solid var(--border); border-radius:8px; cursor:pointer;">리셋</button>
    </div>
  </div>
</div>

<header>
  <h1>3월 세부 계획표</h1>
  <p class="subtitle">2026. 3. 2 — 3. 25 · 독서이력서 34권 완주</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>독서이력서</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>한국어</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent4)"></div>칼럼분석</div>
  </div>
</header>

<div class="progress-section">
  <div style="display:flex; justify-content:space-between; font-size:12px;">
    <span>독서이력서 완성도: <strong id="bar-history">0</strong> / 34</span>
  </div>
  <div class="progress-bar-wrap">
    <div id="bar-history-fill" class="progress-bar-fill" style="width:0%; background:var(--accent3);"></div>
  </div>
</div>

<div class="week-section">
  <div class="week-label">1주차 · MAR 02 - 08</div>
  <div class="week-grid" id="calendar-grid">
    <!-- 자바스크립트가 날짜 카드를 생성하거나 직접 채워넣을 수 있습니다. 여기서는 3/2 예시 하나만 유지 -->
    <div class="day-card" data-date="02">
      <div class="day-header"><span class="day-date">02</span> <span class="day-of-week">Mon</span></div>
      <div class="tasks">
        <div class="task reading">📖 독서이력서 2권</div>
        <div class="task korean">✍️ 한국어 1시간</div>
        <div class="task study">📡 칼럼분석①</div>
      </div>
    </div>
    <!-- ... 나머지 날짜들은 원본 HTML을 참조하여 추가 ... -->
  </div>
</div>

<div class="booklist-section">
  <h3 style="margin-bottom:15px; font-size:14px; color:var(--accent3);">📚 독서이력서 대상 도서 (34권)</h3>
  <div id="book-list">
    <!-- 자바스크립트가 여기에 책 목록을 생성합니다 -->
  </div>
</div>

<!-- [Firebase 동기화 모듈] -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBdwU3wL6Ks4SV5YCQPMOENpXrMt8iUSrg",
    authDomain: "glittery-ganache.firebaseapp.com",
    projectId: "glittery-ganache",
    storageBucket: "glittery-ganache.firebasestorage.app",
    messagingSenderId: "105377509245",
    appId: "1:105377509245:web:e4a2ee0f048cb7e4bde614",
    measurementId: "G-0W2F0GZXFX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 전역 함수로 등록하여 일반 스크립트에서 호출 가능하게 함
  window.syncToFirebase = async (id, checked) => {
    await setDoc(doc(db, "syncData", id), { checked, time: new Date() });
  };

  // 실시간 수신 리스너
  onSnapshot(collection(db, "syncData"), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      const id = change.doc.id;
      const isChecked = change.doc.data().checked;

      // 1. 계획표 태스크 업데이트
      const taskEl = document.querySelector(`[data-task-id="${id}"]`);
      if (taskEl) {
        isChecked ? taskEl.classList.add('done') : taskEl.classList.remove('done');
      }

      // 2. 독서 리스트 체크박스 업데이트
      if (id.startsWith('book_')) {
        const cb = document.querySelector(`input[data-sync-id="${id}"]`);
        if (cb) {
          cb.checked = isChecked;
          updateRowStyle(cb.closest('.book-item'));
        }
      }
    });
    updateStats();
  });
</script>

<!-- [UI 및 기능 스크립트] -->
<script>
const bookTitles = ["거짓말 게임", "계속해보겠습니다", "공정하다는 착각", "깻잎 투쟁기", "나인", "난장이가 쏘아올린 작은 공", "도파민네이션", "돌이킬 수 있는", "마음 가면", "매끄러운 세계와 그 적들", "물욕의 세계", "병원탐험기", "빨간 구두 꺼져!", "사라진 세계", "사람, 장소, 환대", "세상은 이야기로 만들어졌다", "소설은 어떻게 작동하는가", "시녀 이야기", "암컷들", "어린이라는 세계", "위대한 개츠비", "음악의 사물들", "이반 일리치의 죽음", "이방인", "인공지능은 나의 읽기·쓰기", "자연에 이름 붙이기", "절창", "지구 생물체는 항복하라", "지금 우리 곁의 쓰레기", "진짜 게으른 사람", "촉진하는 밤", "트릭 미러", "편집자란 무엇인가", "희랍어 시간"];

// 책 리스트 생성
function renderBooks() {
  const container = document.getElementById('book-list');
  bookTitles.forEach((title, i) => {
    const row = document.createElement('div');
    row.className = 'book-item';
    row.innerHTML = `
      <div style="font-size:12px;">${title}</div>
      <label class="custom-cb">읽음 <input type="checkbox" data-sync-id="book_${i}_read" onchange="window.syncToFirebase(this.dataset.syncId, this.checked)"></label>
      <label class="custom-cb">진행 <input type="checkbox" data-sync-id="book_${i}_wip" onchange="window.syncToFirebase(this.dataset.syncId, this.checked)"></label>
      <label class="custom-cb">완성 <input type="checkbox" data-sync-id="book_${i}_history" onchange="window.syncToFirebase(this.dataset.syncId, this.checked)"></label>
    `;
    container.appendChild(row);
  });
}

function updateRowStyle(row) {
  if (!row) return;
  const isRead = row.querySelector('input[data-sync-id*="_read"]').checked;
  const isHist = row.querySelector('input[data-sync-id*="_history"]').checked;
  if (isRead && isHist) row.classList.add('all-done');
  else row.classList.remove('all-done');
}

function updateStats() {
  const total = 34;
  const historyChecked = document.querySelectorAll('input[data-sync-id*="_history"]:checked').length;
  document.getElementById('bar-history').innerText = historyChecked;
  document.getElementById('bar-history-fill').style.width = (historyChecked / total * 100) + '%';
}

// 계획표 항목에 ID 부여 및 이벤트 연결
function initTasks() {
  document.querySelectorAll('.day-card').forEach(card => {
    const date = card.dataset.date;
    card.querySelectorAll('.task').forEach((task, idx) => {
      const taskId = `task_${date}_${idx}`;
      task.setAttribute('data-task-id', taskId);
      task.onclick = function() {
        const isDone = !this.classList.contains('done');
        window.syncToFirebase(taskId, isDone);
      }
    });
  });
}

// 오늘 날짜 표시
function applyToday() {
  const now = new Date();
  if (now.getMonth() + 1 === 3) { // 3월일 때만
    const dayStr = String(now.getDate()).padStart(2, '0');
    const todayCard = document.querySelector(`.day-card[data-date="${dayStr}"]`);
    if (todayCard) {
      todayCard.classList.add('today');
      todayCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

// 타이머 기능
let timeLeft = 50 * 60;
let timerId = null;
function initPomo() {
  const display = document.getElementById('pomo-display');
  const startBtn = document.getElementById('pomo-start');
  
  startBtn.onclick = () => {
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
      startBtn.innerText = '시작';
    } else {
      timerId = setInterval(() => {
        timeLeft--;
        const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
        const s = String(timeLeft % 60).padStart(2, '0');
        display.innerText = `${m}:${s}`;
        if (timeLeft <= 0) clearInterval(timerId);
      }, 1000);
      startBtn.innerText = '일시정지';
    }
  };
  
  document.getElementById('pomo-reset').onclick = () => {
    clearInterval(timerId);
    timerId = null;
    timeLeft = 50 * 60;
    display.innerText = "50:00";
    startBtn.innerText = '시작';
  };
}

window.onload = () => {
  renderBooks();
  initTasks();
  applyToday();
  initPomo();
};
</script>
</body>
</html>
