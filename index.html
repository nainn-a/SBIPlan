<!DOCTYPE html>

<head>

<style>
  /* [기존 CSS 스타일 유지] */
  :root { --bg: #f5f3ef; --surface: #ffffff; --surface2: #f0ede8; --border: #e2ddd6; --text: #2a2724; --text-muted: #7a7570; --text-dim: #b0aba4; --accent: #a07840; --accent2: #4a8c62; --accent3: #8c4f65; --accent4: #4a7a9c; --red: #a04840; --today: #a0784015; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-weight: 300; min-height: 100vh; padding: 40px 24px 80px; }
  header { max-width: 900px; margin: 0 auto 48px; border-bottom: 1px solid var(--border); padding-bottom: 28px; }
  h1 { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .subtitle { margin-top: 8px; font-size: 13px; color: var(--text-muted); }
  .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .week-section { max-width: 900px; margin: 0 auto 32px; }
  .week-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; padding-left: 2px; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; min-height: 180px; position: relative; transition: border-color 0.2s; cursor: pointer; }
  .day-card.today { border: 3px solid #7a9ab5; }
  .day-date { font-size: 18px; font-family: 'Noto Serif KR', serif; font-weight: 600; }
  .day-of-week { font-size: 9px; color: var(--text-muted); }
  .tasks { display: flex; flex-direction: column; gap: 4px; }
  .task { font-size: 10px; padding: 4px 7px; border-radius: 4px; line-height: 1.4; display: flex; gap: 5px; cursor: pointer; user-select: none; }
  .task.done { opacity: 0.45; text-decoration: line-through; }
  /* 태스크 색상들 */
  .task.reading { background: #a0784012; border-left: 2px solid var(--accent); color: #7a5c2e; }
  .task.book { background: #5a3e1a12; border-left: 2px solid #8b6914; color: #5a3e1a; }
  .task.cover { background: #8c4f6512; border-left: 2px solid var(--accent3); color: #6e3a50; }
  .task.korean { background: #4a8c6212; border-left: 2px solid var(--accent2); color: #366a4a; }
  .task.study { background: #4a7a9c12; border-left: 2px solid var(--accent4); color: #365e78; }
  .task.milestone { background: #a0484012; border-left: 2px solid var(--red); color: var(--red); font-weight: 500; }
  .progress-section { max-width: 900px; margin: 0 auto 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; }
  .progress-bar-wrap { background: var(--border); border-radius: 3px; height: 7px; overflow: hidden; margin-top: 5px; }
  .progress-bar-fill { height: 100%; transition: width 0.4s ease; }
  .booklist-section { max-width: 900px; margin: 32px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px 28px; overflow-x: auto; }
  .book-item { display: grid; grid-template-columns: 340px 120px 1fr 80px 80px 80px; gap: 8px; padding: 7px 10px; align-items: center; border-bottom: 1px solid var(--surface2); }
  .book-item.all-done { opacity: 0.5; text-decoration: line-through; }
  .custom-cb input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
  .memo-badge { font-size: 9px; background: #7a9ab5; color: #fff; border-radius: 10px; padding: 1px 6px; margin-left: 6px; }
</style>
</head>

<div id="pomo-section" style="max-width:900px; margin:0 auto 32px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px 28px;">

<!-- Firebase 핵심 스크립트 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 1. Firebase 설정
  const firebaseConfig = {
    apiKey: "AIzaSyBdwU3wL6Ks4SV5YCQPMOENpXrMt8iUSrg",
    authDomain: "glittery-ganache.firebaseapp.com",
    projectId: "glittery-ganache",
    storageBucket: "glittery-ganache.firebasestorage.app",
    messagingSenderId: "105377509245",
    appId: "1:105377509245:web:e4a2ee0f048cb7e4bde614",
    measurementId: "G-0W2F0GZXFX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 2. 계획표 체크박스 동기화 (Task)
  function initTaskSync() {
    const tasks = document.querySelectorAll('.task');
    tasks.forEach((task, idx) => {
      const card = task.closest('.day-card');
      const date = card ? card.querySelector('.day-date').innerText.trim() : 'x';
      const taskId = `task_${date}_${idx}`; // 식별 아이디 생성

      // 클릭 시 Firebase에 저장
      task.addEventListener('click', async () => {
        const isDone = !task.classList.contains('done');
        await setDoc(doc(db, "syncData", taskId), { checked: isDone });
      });
    });
  }

  // 3. 독서 리스트 체크박스 동기화 (Book)
  function initBookSync() {
    // 독서 리스트가 그려진 후 실행
    setTimeout(() => {
      const bookChecks = document.querySelectorAll('#book-list input[type="checkbox"]');
      bookChecks.forEach(cb => {
        const bookId = `book_${cb.dataset.i}_${cb.dataset.type}`; // 식별 아이디 생성

        cb.addEventListener('change', async () => {
          await setDoc(doc(db, "syncData", bookId), { checked: cb.checked });
        });
      });
    }, 1000);
  }

  // 4. 실시간 리스너 (모든 기기 동기화 핵심)
  onSnapshot(collection(db, "syncData"), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      const id = change.doc.id;
      const isChecked = change.doc.data().checked;

      // 계획표 태스크 업데이트
      const taskEl = document.querySelector(`[data-task-id="${id}"]`); // 아래 init에서 ID 부여함
      if (id.startsWith('task_')) {
        const [_, date, idx] = id.split('_');
        const cards = document.querySelectorAll('.day-card');
        cards.forEach(card => {
          if (card.querySelector('.day-date')?.innerText.trim() === date) {
            const targetTask = card.querySelectorAll('.task')[idx];
            if (targetTask) {
              isChecked ? targetTask.classList.add('done') : targetTask.classList.remove('done');
            }
          }
        });
      }

      // 독서 리스트 업데이트
      if (id.startsWith('book_')) {
        const [_, bIdx, bType] = id.split('_');
        const cb = document.querySelector(`input[data-i="${bIdx}"][data-type="${bType}"]`);
        if (cb) {
          cb.checked = isChecked;
          // 부모 행 스타일 업데이트
          const row = cb.closest('.book-item');
          if (row) updateRowStyle(row, bIdx);
        }
      }
    });
    updateStats(); // 통계 갱신
  });

  // 초기화 함수 실행
  window.addEventListener('load', () => {
    initTaskSync();
    initBookSync();
    // 기존 기능(오늘 날짜 표시 등) 유지
    if (typeof applyToday === 'function') applyToday();
  });

  // 독서 이력서 통계 자동 계산
  function updateStats() {
    const total = 34;
    const historyChecked = document.querySelectorAll('input[data-type="history"]:checked').length;
    const bar = document.getElementById('bar-history-fill');
    const text = document.getElementById('bar-history');
    if (bar) bar.style.width = (historyChecked / total * 100) + '%';
    if (text) text.innerText = historyChecked;
  }

  function updateRowStyle(row, idx) {
    const isRead = row.querySelector('input[data-type="read"]')?.checked;
    const isHist = row.querySelector('input[data-type="history"]')?.checked;
    row.className = ['book-item', (isRead && isHist) ? 'all-done' : (isRead ? 'read-done' : '')].filter(Boolean).join(' ');
  }
</script>

  // 포모도로 타이머, 모달 팝업 등 UI 관련 기능은 원본 코드의 것을 그대로 아래에 두시면 됩니다.

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBdwU3wL6Ks4SV5YCQPMOENpXrMt8iUSrg",
    authDomain: "glittery-ganache.firebaseapp.com",
    projectId: "glittery-ganache",
    storageBucket: "glittery-ganache.firebasestorage.app",
    messagingSenderId: "105377509245",
    appId: "1:105377509245:web:e4a2ee0f048cb7e4bde614",
    measurementId: "G-0W2F0GZXFX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // [동기화 로직] 체크박스 클릭 시 Firebase 저장
  window.syncToFirebase = async (id, checked) => {
    try {
      await setDoc(doc(db, "syncData", id), { checked, updatedAt: new Date() });
    } catch (e) { console.error("Sync Error:", e); }
  };

  // [동기화 로직] 실시간 데이터 수신 및 화면 반영
  onSnapshot(collection(db, "syncData"), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      const id = change.doc.id;
      const isChecked = change.doc.data().checked;

      // 1. 계획표(Task) 반영
      const taskEl = document.querySelector(`[data-task-id="${id}"]`);
      if (taskEl) {
        isChecked ? taskEl.classList.add('done') : taskEl.classList.remove('done');
      }

      // 2. 독서 리스트(Book) 반영
      if (id.startsWith('book_')) {
        const [_, bIdx, bType] = id.split('_');
        const cb = document.querySelector(`input[data-i="${bIdx}"][data-type="${bType}"]`);
        if (cb) {
          cb.checked = isChecked;
          const row = cb.closest('.book-item');
          if (row) {
            const isRead = row.querySelector('input[data-type="read"]')?.checked;
            const isHist = row.querySelector('input[data-type="history"]')?.checked;
            row.className = ['book-item', (isRead && isHist) ? 'all-done' : (isRead ? 'read-done' : '')].filter(Boolean).join(' ');
          }
        }
      }
    });
    if (typeof updateBookStats === 'function') updateBookStats();
  });
</script>

<!-- 2. 원본 UI 기능 (타이머, 메모, 리스트 렌더링) -->
<script>
// --- 데이터 및 설정 ---
const books = [
  { title: "거짓말 게임", author: "조무원", publisher: "민음사" },

];

// --- 포모도로 타이머 로직 ---
var pomoConfig = { focus: 50, breakT: 10, longBreak: 30, sessions: 9, interval: 3 };
var pomoState = { mode: 'focus', running: false, timeLeft: 50*60, focusDone: 0 };
var pomoTimer = null;

function updatePomoDisplay() {
  var m = Math.floor(pomoState.timeLeft / 60);
  var s = pomoState.timeLeft % 60;
  document.getElementById('pomo-display').textContent = (m<10?'0':'')+m + ':' + (s<10?'0':'')+s;
}

function initPomo() {
  document.getElementById('pomo-start').onclick = function() {
    if (pomoState.running) {
      clearInterval(pomoTimer);
      this.textContent = '시작';
    } else {
      pomoTimer = setInterval(() => {
        pomoState.timeLeft--;
        updatePomoDisplay();
        if (pomoState.timeLeft <= 0) clearInterval(pomoTimer);
      }, 1000);
      this.textContent = '일시정지';
    }
    pomoState.running = !pomoState.running;
  };
  document.getElementById('pomo-reset').onclick = function() {
    clearInterval(pomoTimer);
    pomoState.running = false;
    pomoState.timeLeft = pomoConfig.focus * 60;
    document.getElementById('pomo-start').textContent = '시작';
    updatePomoDisplay();
  };
}

// --- 독서 리스트 및 통계 ---
function updateBookStats() {
  var readCount = document.querySelectorAll('input[data-type="read"]:checked').length;
  var histCount = document.querySelectorAll('input[data-type="history"]:checked').length;
  document.getElementById('bar-read').textContent = readCount;
  document.getElementById('bar-history').textContent = histCount;
  document.getElementById('bar-read-fill').style.width = (readCount/34*100)+'%';
  document.getElementById('bar-history-fill').style.width = (histCount/34*100)+'%';
}

function initBookChecks() {
  const cbs = document.querySelectorAll('#book-list input[type="checkbox"]');
  cbs.forEach(cb => {
    cb.onchange = function() {
      const id = `book_${this.dataset.i}_${this.dataset.type}`;
      window.syncToFirebase(id, this.checked); // Firebase로 전송
    };
  });
}

// --- 계획표 태스크 동기화 준비 ---
function initTaskIDs() {
  const cards = document.querySelectorAll('.day-card');
  cards.forEach(card => {
    const date = card.querySelector('.day-date')?.innerText.trim();
    const tasks = card.querySelectorAll('.task');
    tasks.forEach((task, idx) => {
      const taskId = `task_${date}_${idx}`;
      task.setAttribute('data-task-id', taskId); // 이름표 달기
      task.onclick = function() {
        const isDone = !this.classList.contains('done');
        window.syncToFirebase(taskId, isDone); // Firebase로 전송
      };
    });
  });
}

// --- 공통 초기화 ---
window.onload = function() {
  initPomo();
  initTaskIDs();
  initBookChecks();
  updateBookStats();
};
</script>
